<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER PLATFORM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:black;color:white;font-family:Arial;}

.nav{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
border-bottom:2px solid #00ffc3;
}

.nav button{
background:#111;
color:white;
border:none;
padding:10px;
border-radius:10px;
min-width:90px;
}

.active{background:#00ffc3;color:black;}

.section{display:none;padding:20px;}
.show{display:block;}

.card{
background:#111;
padding:20px;
margin:15px 0;
border-radius:15px;
}

.card img, iframe{
width:100%;
border-radius:10px;
margin-top:10px;
}

textarea{width:100%;height:100px;}

button{padding:10px;margin:5px;border:none;border-radius:10px;}

#reader{
display:none;
padding:20px;
line-height:1.9;
font-size:16px;
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showTab(event,'stories')" class="active">Stories</button>
<button onclick="showTab(event,'post')">Post</button>
<button onclick="showTab(event,'news')">News</button>
<button onclick="showTab(event,'community')">Community</button>
</div>

<!-- STORIES -->
<div id="stories" class="section show">
<h2>📖 Stories</h2>
<div id="storyFeed"></div>
</div>

<!-- POSTS -->
<div id="post" class="section">
<h2>✍️ Posts</h2>
<textarea id="postInput"></textarea>
<button onclick="addPost()">Post</button>
<div id="postFeed"></div>
</div>

<!-- NEWS -->
<div id="news" class="section">
<h2>📰 News</h2>
<div id="newsFeed"></div>
</div>

<!-- COMMUNITY -->
<div id="community" class="section">
<h2>🌍 Community</h2>
<div id="communityFeed"></div>
</div>

<!-- READER -->
<div id="reader">
<button onclick="goBack()">⬅ Back</button>
<button onclick="speakNow()">🔊 Read</button>
<h2 id="title"></h2>
<img id="img">
<p id="content"></p>

<!-- VIDEO INSIDE READER -->
<div id="videoBox"></div>

</div>

<script>

/* NAV */
function showTab(e,id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("show");
e.target.classList.add("active");
reader.style.display="none";
}

/* 🔊 SPEAK FUNCTION */
function speakNow(){
let text = document.getElementById("content").innerText;
let speech = new SpeechSynthesisUtterance(text);
speech.rate = 1;
speech.pitch = 1;
speechSynthesis.speak(speech);
}

/* STORIES */
let stories=[];
for(let i=1;i<=40;i++){
stories.push({
title:"🔥 Story "+i,
img:`https://picsum.photos/400/200?story${i}`,
content:`This is story ${i}. Life is hard but never give up. Keep pushing and growing.`,
video:"Sj6Wdr2vB7o"
});
}

function loadStories(){
storyFeed.innerHTML="";
stories.forEach((s,i)=>{
storyFeed.innerHTML+=`
<div class="card" onclick="openStory(${i})">
<h3>${s.title}</h3>
<img src="${s.img}">
</div>`;
});
}

function openStory(i){
openReader(stories[i].title,stories[i].img,stories[i].content,stories[i].video);
}

/* POSTS */
let posts=[];

function addPost(){
let val=postInput.value;
posts.unshift({
text:val,
img:`https://picsum.photos/400/200?post${Math.random()}`,
video:"jcg5YnZqtRo"
});
renderPosts();
}

function renderPosts(){
postFeed.innerHTML="";
posts.forEach((p,i)=>{
postFeed.innerHTML+=`
<div class="card" onclick="openPost(${i})">
<p>${p.text}</p>
<img src="${p.img}">
</div>`;
});
}

function openPost(i){
openReader("Post",posts[i].img,posts[i].text,"jcg5YnZqtRo");
}

/* NEWS */
let news=[];
for(let i=1;i<=20;i++){
news.push({
title:"📰 News "+i,
img:`https://picsum.photos/400/200?news${i}`,
content:`Detailed news ${i}. This explains events and updates happening around the world.`,
video:"3JZ4pnNtyxQ"
});
}

function loadNews(){
newsFeed.innerHTML="";
news.forEach((n,i)=>{
newsFeed.innerHTML+=`
<div class="card" onclick="openNews(${i})">
<h3>${n.title}</h3>
<img src="${n.img}">
</div>`;
});
}

function openNews(i){
openReader(news[i].title,news[i].img,news[i].content,news[i].video);
}

/* COMMUNITY */
let community=[];
for(let i=1;i<=20;i++){
community.push({
text:"🔥 Community post "+i,
img:`https://picsum.photos/400/200?community${i}`,
video:"OPf0YbXqDm0"
});
}

function loadCommunity(){
communityFeed.innerHTML="";
community.forEach((c,i)=>{
communityFeed.innerHTML+=`
<div class="card" onclick="openCommunity(${i})">
<p>${c.text}</p>
<img src="${c.img}">
</div>`;
});
}

function openCommunity(i){
openReader("Community",community[i].img,community[i].text,"OPf0YbXqDm0");
}

/* READER CORE */
function openReader(t,i,c,v){
reader.style.display="block";
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));

title.innerText=t;
img.src=i;
content.innerText=c;

videoBox.innerHTML=`
<iframe src="https://www.youtube.com/embed/${v}" allowfullscreen></iframe>
`;

/* AUTO SPEAK */
setTimeout(()=>{
speakNow();
},500);
}

/* BACK */
function goBack(){
reader.style.display="none";
document.getElementById("stories").classList.add("show");
}

/* INIT */
loadStories();
loadNews();
loadCommunity();

</script>

</body>
</html>
