<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER PLATFORM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:black;color:white;font-family:Arial;}

.nav{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
border-bottom:2px solid #00ffc3;
}

.nav button{
background:#111;
color:white;
border:none;
padding:10px;
border-radius:10px;
min-width:90px;
}

.active{background:#00ffc3;color:black;}

.section{display:none;padding:20px;}
.show{display:block;}

.card{
background:#111;
padding:20px;
margin:15px 0;
border-radius:15px;
}

.card img, iframe{
width:100%;
border-radius:10px;
margin-top:10px;
}

textarea{width:100%;height:100px;}

button{padding:10px;margin:5px;border:none;border-radius:10px;}

#reader{
display:none;
padding:20px;
line-height:1.9;
font-size:16px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<button onclick="showTab(event,'stories')" class="active">Stories</button>
<button onclick="showTab(event,'post')">Post</button>
<button onclick="showTab(event,'news')">News</button>
<button onclick="showTab(event,'community')">Community</button>
</div>

<!-- STORIES -->
<div id="stories" class="section show">
<h2>📖 Stories</h2>
<div id="storyFeed"></div>
</div>

<!-- POSTS -->
<div id="post" class="section">
<h2>✍️ Posts</h2>
<textarea id="postInput"></textarea>
<button onclick="addPost()">Post</button>
<div id="postFeed"></div>
</div>

<!-- NEWS -->
<div id="news" class="section">
<h2>📰 News</h2>
<div id="newsFeed"></div>
</div>

<!-- COMMUNITY -->
<div id="community" class="section">
<h2>🌍 Community</h2>
<div id="communityFeed"></div>
</div>

<!-- READER -->
<div id="reader">
<button onclick="goBack()">⬅ Back</button>
<h2 id="title"></h2>
<img id="img">
<p id="content"></p>
</div>

<script>

/* NAV */
function showTab(e,id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("show");
e.target.classList.add("active");
reader.style.display="none";
}

/* ================= STORIES ================= */
let stories=[];
for(let i=1;i<=50;i++){
stories.push({
title:"🔥 Story "+i,
img:`https://picsum.photos/400/200?story${i}`,
content:`This is a deep story ${i}.

Life is not easy. Many times you will fail.

But if you keep going, you will succeed.

Never give up. Stay focused. Stay strong.`
});
}

function loadStories(){
storyFeed.innerHTML="";
stories.forEach((s,i)=>{
storyFeed.innerHTML+=`
<div class="card" onclick="openStory(${i},'story')">
<h3>${s.title}</h3>
<img src="${s.img}">
<p>Tap to read full story</p>
</div>`;
});
}

/* ================= POSTS ================= */
let posts=[];
function addPost(){
let val=postInput.value;

posts.unshift({
text:val,
img:`https://picsum.photos/400/200?post${Math.random()}`
});

renderPosts();
}

function renderPosts(){
postFeed.innerHTML="";
posts.forEach((p,i)=>{
postFeed.innerHTML+=`
<div class="card" onclick="openPost(${i})">
<p>${p.text}</p>
<img src="${p.img}">
</div>`;
});
}

function openPost(i){
reader.style.display="block";
hideAll();
title.innerText="Post";
img.src=posts[i].img;
content.innerText=posts[i].text+" This is expanded content with more explanation and details.";
}

/* ================= NEWS ================= */
let news=[];
for(let i=1;i<=30;i++){
news.push({
title:"📰 News "+i,
img:`https://picsum.photos/400/200?news${i}`,
content:`Breaking news ${i}.

This is detailed news content explaining events, economy, technology, and society.

Stay informed and updated.`
});
}

function loadNews(){
newsFeed.innerHTML="";
news.forEach((n,i)=>{
newsFeed.innerHTML+=`
<div class="card" onclick="openNews(${i})">
<h3>${n.title}</h3>
<img src="${n.img}">
<p>Tap to read</p>
</div>`;
});
}

function openNews(i){
reader.style.display="block";
hideAll();
title.innerText=news[i].title;
img.src=news[i].img;
content.innerText=news[i].content;
}

/* ================= COMMUNITY ================= */
let community=[];
for(let i=1;i<=30;i++){
community.push({
text:"🔥 Community discussion "+i,
img:`https://picsum.photos/400/200?community${i}`
});
}

function loadCommunity(){
communityFeed.innerHTML="";
community.forEach((c,i)=>{
communityFeed.innerHTML+=`
<div class="card" onclick="openCommunity(${i})">
<p>${c.text}</p>
<img src="${c.img}">
</div>`;
});
}

function openCommunity(i){
reader.style.display="block";
hideAll();
title.innerText="Community";
img.src=community[i].img;
content.innerText=community[i].text+" More detailed discussion and interaction.";
}

/* ================= VIDEOS + MUSIC ================= */

function addMedia(){

let media = document.createElement("div");

media.innerHTML = `
<h2>🎥 Videos</h2>

<div class="card">
<iframe src="https://www.youtube.com/embed/Sj6Wdr2vB7o" allowfullscreen></iframe>
</div>

<div class="card">
<iframe src="https://www.youtube.com/embed/jcg5YnZqtRo" allowfullscreen></iframe>
</div>

<h2>🎵 Music Videos</h2>

<div class="card">
<iframe src="https://www.youtube.com/embed/hVEp-P2-rqY" allowfullscreen></iframe>
</div>

<div class="card">
<iframe src="https://www.youtube.com/embed/0zB6rWvL2P8" allowfullscreen></iframe>
</div>
`;

document.getElementById("stories").appendChild(media);

}

/* ================= HELPERS ================= */
function hideAll(){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
}

function goBack(){
reader.style.display="none";
document.getElementById("stories").classList.add("show");
}

/* INIT */
loadStories();
loadNews();
loadCommunity();
addMedia();

</script>

</body>
</html>
