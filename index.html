<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER PLATFORM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:black;
color:white;
font-family:Arial;
}

/* NAV */
.nav{
display:flex;
overflow-x:auto;
padding:15px;
border-bottom:2px solid #00ffc3;
gap:10px;
}

.nav button{
background:#111;
border:none;
color:white;
padding:10px;
border-radius:10px;
font-size:14px;
min-width:80px;
}

.active{background:#00ffc3;color:black;}

.section{display:none;padding:20px;}
.show{display:block;}

h1{
font-size:28px;
margin-bottom:15px;
}

/* CARD */
.card{
background:#111;
padding:15px;
margin:12px 0;
border-radius:15px;
}

.card img, iframe{
width:100%;
border-radius:10px;
}

/* BIG CARD */
.big{
padding:25px;
font-size:18px;
}

/* MUSIC GRID */
.music-grid{
display:grid;
grid-template-columns:1fr;
gap:15px;
}

/* READER */
#reader{
display:none;
padding:20px;
line-height:1.7;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<button onclick="showTab(event,'stories')" class="active">Stories</button>
<button onclick="showTab(event,'music')">Music</button>
<button onclick="showTab(event,'post')">Post</button>
</div>

<!-- STORIES -->
<div id="stories" class="section show">
<h1>📖 Stories</h1>
<div id="storyFeed"></div>
<div id="extraContent"></div>
</div>

<!-- MUSIC -->
<div id="music" class="section">

<h1>🎵 Music Hub</h1>

<div id="musicContent"></div>

</div>

<!-- POST -->
<div id="post" class="section">
<h1>✍️ Post</h1>
<textarea id="postInput" placeholder="Write something..."></textarea>
<button onclick="addPost()">Post</button>
<div id="postFeed"></div>
</div>

<!-- READER -->
<div id="reader">
<button onclick="goBack()">⬅ Back</button>
<h2 id="title"></h2>
<p id="content"></p>
</div>

<script>

/* NAV */
function showTab(e,id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("show");
e.target.classList.add("active");
reader.style.display="none";
}

/* STORIES */
let stories=[];

for(let i=1;i<=200;i++){
stories.push({
title:"🔥 Story "+i,
content:"Never give up. Keep pushing. Success will come."
});
}

function loadStories(){
storyFeed.innerHTML="";
stories.slice(0,40).forEach((s,i)=>{
storyFeed.innerHTML+=`
<div class="card big" onclick="openStory(${i})">
${s.title}
</div>`;
});
}

/* OPEN */
function openStory(i){
reader.style.display="block";
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
title.innerText=stories[i].title;
content.innerText=stories[i].content;
}

/* BACK */
function goBack(){
reader.style.display="none";
document.getElementById("stories").classList.add("show");
}

/* POSTS */
let posts=[];

function addPost(){
let val=postInput.value;
posts.unshift(val);
renderPosts();
}

function renderPosts(){
postFeed.innerHTML="";
posts.slice(0,20).forEach(p=>{
postFeed.innerHTML+=`<div class="card">${p}</div>`;
});
}

/* ================= */
/* 🎵 MUSIC SYSTEM */
/* ================= */

let musicSections = {
"🔥 Trending":[
"Sj6Wdr2vB7o","jcg5YnZqtRo"
],
"🎤 Wizkid":[
"0zB6rWvL2P8","4NRXx6U8ABQ"
],
"🎤 Davido":[
"hVEp-P2-rqY","2zToEPpFEN8"
],
"🎤 Rema":[
"t9xwN1R5zT0","kPa7bsKwL-c"
],
"🎤 Burna Boy":[
"421w1j87fEM","9bZkp7q19f0"
],
"🎤 Tekno":[
"4b5s2p9Xn7c","3AtDnEC4zak"
],
"💃 Party":[
"ZbZSe6N_BXs","OPf0YbXqDm0"
],
"🎧 Chill":[
"3JZ4pnNtyxQ","Sj6Wdr2vB7o"
],
"🚀 Motivation":[
"jcg5YnZqtRo","ZbZSe6N_BXs"
],
"🌍 Global":[
"OPf0YbXqDm0","3JZ4pnNtyxQ"
]
};

function loadMusic(){

let html="";

for(let section in musicSections){

html+=`<h1>${section}</h1>`;
html+=`<div class="music-grid">`;

musicSections[section].forEach(id=>{
html+=`
<div class="card">
<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
</div>`;
});

html+=`</div>`;
}

musicContent.innerHTML=html;
}

/* EXTRA CONTENT */
function loadExtra(){
let extra="";

for(let i=1;i<=30;i++){
extra+=`<div class="card">💡 Tip ${i}: Stay focused.</div>`;
}

for(let i=1;i<=20;i++){
extra+=`
<div class="card">
🗳 Poll ${i}
<button onclick="alert('Success')">Success</button>
<button onclick="alert('Money')">Money</button>
</div>`;
}

extraContent.innerHTML=extra;
}

/* INIT */
loadStories();
loadMusic();
loadExtra();

</script>

</body>
</html>
