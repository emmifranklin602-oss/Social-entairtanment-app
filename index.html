<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER PLATFORM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:black;color:white;font-family:Arial;}

.nav{display:flex;justify-content:space-around;padding:15px;border-bottom:2px solid #00ffc3;}
.nav button{background:none;border:none;color:white;font-size:4vw;font-weight:bold;}

.active{color:#00ffc3;}

.section{display:none;padding:20px;}
.show{display:block;}

h1{font-size:clamp(28px,6vw,60px);margin-bottom:20px;}

.card{
background:#111;
padding:20px;
margin:15px 0;
border-radius:20px;
cursor:pointer;
}

.card img{
width:100%;
border-radius:10px;
margin-top:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
}

/* reader */
#reader{
display:none;
padding:20px;
line-height:1.7;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<button onclick="showTab(event,'stories')" class="active">Stories</button>
<button onclick="showTab(event,'post')">Post</button>
</div>

<!-- STORIES -->
<div id="stories" class="section show">

<h1>📖 Stories Feed</h1>

<div>
<button onclick="filterCategory('All')">All</button>
<button onclick="filterCategory('Hustle')">Hustle</button>
<button onclick="filterCategory('Money')">Money</button>
<button onclick="filterCategory('Motivation')">Motivation</button>
<button onclick="filterCategory('Love')">Love</button>
<button onclick="filterCategory('Pidgin')">Pidgin</button>
</div>

<div id="storyFeed"></div>

<div id="extraContent"></div>

</div>

<!-- POST -->
<div id="post" class="section">
<h1>✍️ Post Story</h1>

<input id="titleInput" placeholder="Title"><br><br>
<textarea id="storyInput" placeholder="Write story..." style="width:100%;height:120px;"></textarea><br>
<input id="imageInput" placeholder="Image URL"><br>
<button onclick="addStory()">Post</button>

</div>

<!-- READER -->
<div id="reader">
<button onclick="goBack()">⬅ Back</button>
<button onclick="continueReading()">▶ Continue</button>
<button onclick="speakStory()">🔊 Listen</button>

<h2 id="title"></h2>
<img id="img">
<p id="content"></p>
</div>

<script>

/* NAV */
function showTab(e,id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("show");
e.target.classList.add("active");
reader.style.display="none";
}

/* DATA */
let categories=["Hustle","Money","Motivation","Love","Pidgin"];
let stories=[];

/* 🔥 500 STORIES */
for(let i=1;i<=500;i++){
let cat=categories[i%categories.length];
stories.push({
title:`🔥 ${cat} Story ${i}`,
category:cat,
content:`${cat} story ${i}.

Stay focused.
Stay consistent.

Never give up.`,
img:`https://picsum.photos/400/200?${i}`
});
}

/* 👑 SPECIAL STORY */
stories.unshift({
title:"👑 Queen Adaeze",
category:"Legend",
content:`A powerful African story about pride and wisdom.

Adaeze learned humility after making wrong choices.

Lesson: choose wisely.`,
img:"https://picsum.photos/400/200?queen"
});

/* LOAD */
function loadStories(filter="All"){
storyFeed.innerHTML="";

stories.slice(0,50).forEach((s,i)=>{
if(filter==="All"||s.category===filter){
storyFeed.innerHTML+=`
<div class="card" onclick="openStory(${i})">
<h3>${s.title}</h3>
<p>${s.category}</p>
<img src="${s.img}">
</div>`;
}
});
}

/* FILTER */
function filterCategory(cat){
loadStories(cat);
}

/* OPEN */
function openStory(i){
localStorage.setItem("lastStory",i);

document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
reader.style.display="block";

title.innerText=stories[i].title;
content.innerText=stories[i].content;
img.src=stories[i].img;
}

/* BACK */
function goBack(){
reader.style.display="none";
storiesSection=document.getElementById("stories");
storiesSection.classList.add("show");
}

/* CONTINUE */
function continueReading(){
let i=localStorage.getItem("lastStory");
if(i!==null) openStory(i);
}

/* VOICE */
function speakStory(){
let speech=new SpeechSynthesisUtterance(content.innerText);
speechSynthesis.speak(speech);
}

/* ADD STORY */
function addStory(){
let t=titleInput.value;
let c=storyInput.value;
let i=imageInput.value||"https://picsum.photos/400/200";

if(!t||!c) return alert("Fill everything");

stories.unshift({title:t,content:c,img:i,category:"User"});
loadStories();
}

/* ========================= */
/* 🔥 EXTRA (5000+ SYSTEM) */
/* ========================= */

let extraHTML="";

/* POSTS */
for(let i=1;i<=100;i++){
extraHTML+=`<div class="card">🔥 Post ${i}: Stay consistent and grow daily.</div>`;
}

/* TIPS */
for(let i=1;i<=100;i++){
extraHTML+=`<div class="card">💡 Tip ${i}: Learn skills, avoid distractions.</div>`;
}

/* MUSIC */
for(let i=1;i<=20;i++){
extraHTML+=`
<div class="card">
🎵 Music ${i}
<audio controls>
<source src="https://www.w3schools.com/html/horse.mp3">
</audio>
</div>`;
}

/* POLLS */
for(let i=1;i<=20;i++){
extraHTML+=`
<div class="card">
🗳 Poll ${i}: What do you want?
<button onclick="alert('You chose success')">Success</button>
<button onclick="alert('You chose money')">Money</button>
</div>`;
}

document.getElementById("extraContent").innerHTML=extraHTML;

/* INIT */
loadStories();

</script>

</body>
</html>
