<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER PLATFORM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:black;
color:white;
font-family:Arial;
}

/* NAV */
.nav{
display:flex;
justify-content:space-around;
padding:15px;
border-bottom:2px solid #00ffc3;
}

.nav button{
background:none;
border:none;
color:white;
font-size:4vw;
font-weight:bold;
}

/* ACTIVE */
.active{color:#00ffc3;}

/* SEARCH */
.search{
width:90%;
margin:15px auto;
display:block;
padding:15px;
border-radius:20px;
font-size:18px;
border:none;
}

/* SECTION */
.section{display:none;padding:20px;}
.show{display:block;}

/* TITLE */
h1{
font-size:clamp(28px,6vw,60px);
margin-bottom:20px;
}

/* CARD */
.card{
background:linear-gradient(90deg,#111,#333);
padding:20px;
margin:15px 0;
border-radius:20px;
font-size:18px;
font-weight:bold;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
background:#444;
}

/* BUTTON */
.link-btn{
display:block;
margin-top:10px;
padding:12px;
background:#00ffc3;
color:black;
text-align:center;
border-radius:10px;
text-decoration:none;
}

/* FEATURE BOX */
#featureBox{
display:none;
padding:20px;
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
background:#111;
margin-top:30px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<button onclick="showTab(event,'apps')" class="active">Apps</button>
<button onclick="showTab(event,'entertainment')">Entertainment</button>
<button onclick="showTab(event,'tips')">Tips</button>
<button onclick="showTab(event,'knowledge')">Knowledge</button>
</div>

<!-- SEARCH -->
<input class="search" placeholder="Search anything..." onkeyup="searchContent()">

<!-- APPS -->
<div id="apps" class="section show">
<h1>🔥 Apps</h1>

<div class="card">📱 WhatsApp
<a href="https://wa.me" class="link-btn">Open</a></div>

<div class="card">📸 Instagram
<a href="https://instagram.com" class="link-btn">Open</a></div>

<div class="card">🎵 Spotify
<a href="https://spotify.com" class="link-btn">Open</a></div>

<div class="card">🎨 Canva
<a href="https://canva.com" class="link-btn">Open</a></div>

</div>

<!-- ENTERTAINMENT -->
<div id="entertainment" class="section">
<h1>🎬 Entertainment</h1>

<div class="card" onclick="openFeature('video')">🎥 Watch Videos</div>
<div class="card" onclick="openFeature('game')">🎮 Play Game</div>
<div class="card" onclick="openFeature('music')">🎵 Music</div>

</div>

<!-- TIPS -->
<div id="tips" class="section">
<h1>💡 Tips</h1>

<div class="card">🔥 Make money online</div>
<div class="card">📈 Grow fast</div>
<div class="card">⚡ Be productive</div>

</div>

<!-- KNOWLEDGE -->
<div id="knowledge" class="section">
<h1>📚 Knowledge</h1>

<div class="card" onclick="openFeature('ai')">🤖 Learn AI</div>
<div class="card" onclick="openFeature('coding')">💻 Learn Coding</div>
<div class="card" onclick="openFeature('business')">📊 Business Ideas</div>

</div>

<!-- FEATURE DISPLAY -->
<div id="featureBox">
<h1>🚀 Feature</h1>
<div id="featureContent"></div>
</div>

<!-- FOOTER -->
<footer>
<h2>🔥 SUPER PLATFORM</h2>
<p>All-in-one powerful website</p>
</footer>

<script>

/* TAB SWITCH */
function showTab(e,id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("show");
e.target.classList.add("active");
document.getElementById("featureBox").style.display="none";
}

/* SEARCH */
function searchContent(){
let input=document.querySelector(".search").value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(input)?"block":"none";
});
}

/* FEATURE OPEN */
function openFeature(type){

document.getElementById("featureBox").style.display="block";

let content="";

if(type==="video"){
content=`
<h2>🎥 Videos</h2>
<video width="100%" controls>
<source src="https://www.w3schools.com/html/mov_bbb.mp4">
</video>`;
}

if(type==="game"){
content=`
<h2>🎮 Game</h2>
<p>Score: <span id="score">0</span></p>
<button onclick="addScore()">CLICK ME</button>`;
}

if(type==="music"){
content=`
<h2>🎵 Music</h2>
<audio controls>
<source src="https://www.w3schools.com/html/horse.mp3">
</audio>`;
}

if(type==="ai"){
content=`<h2>🤖 AI</h2><p>AI is the future.</p>`;
}

if(type==="coding"){
content=`<h2>💻 Coding</h2><p>Learn HTML, CSS, JS.</p>`;
}

if(type==="business"){
content=`<h2>📊 Business</h2><p>Start online business.</p>`;
}

document.getElementById("featureContent").innerHTML=content;
}

/* GAME */
let score=0;
function addScore(){
score++;
document.getElementById("score").innerText=score;
}

</script>

</body>
</html>
