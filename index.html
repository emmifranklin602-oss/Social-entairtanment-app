<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER PLATFORM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:black;
color:white;
font-family:Arial;
}

/* NAV */
.nav{
display:flex;
justify-content:space-around;
padding:15px;
border-bottom:2px solid #00ffc3;
}

.nav button{
background:none;
border:none;
color:white;
font-size:4vw;
font-weight:bold;
}

.active{color:#00ffc3;}

/* SEARCH */
.search{
width:90%;
margin:15px auto;
display:block;
padding:15px;
border-radius:20px;
font-size:18px;
}

/* SECTION */
.section{display:none;padding:20px;}
.show{display:block;}

h1{
font-size:clamp(28px,6vw,60px);
margin-bottom:20px;
}

/* CARD */
.card{
background:#111;
padding:20px;
margin:15px 0;
border-radius:20px;
font-size:18px;
cursor:pointer;
}

.card img{
width:100%;
border-radius:10px;
margin-top:10px;
}

/* READER */
#reader{display:none;padding:20px;}
.back{
padding:10px;
background:#00ffc3;
border:none;
margin-bottom:10px;
}

/* POST BOX */
textarea{
width:100%;
height:100px;
margin-top:10px;
}

button{
padding:10px;
margin-top:10px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<button onclick="showTab(event,'stories')" class="active">Stories</button>
<button onclick="showTab(event,'post')">Post</button>
</div>

<input class="search" placeholder="Search stories..." onkeyup="searchContent()">

<!-- STORIES -->
<div id="stories" class="section show">
<h1>📖 Stories Feed</h1>

<div id="storyFeed"></div>

</div>

<!-- POST -->
<div id="post" class="section">
<h1>✍️ Post Story</h1>

<input id="titleInput" placeholder="Title"><br>
<textarea id="storyInput" placeholder="Write your story..."></textarea>
<input id="imageInput" placeholder="Image URL (optional)">
<button onclick="addStory()">Post</button>

</div>

<!-- READER -->
<div id="reader">
<button class="back" onclick="goBack()">⬅ Back</button>
<h2 id="title"></h2>
<img id="img" style="width:100%;margin:10px 0;">
<p id="content"></p>
</div>

<script>

/* TAB */
function showTab(e,id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("show");
e.target.classList.add("active");
document.getElementById("reader").style.display="none";
}

/* SEARCH */
function searchContent(){
let input=document.querySelector(".search").value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(input)?"block":"none";
});
}

/* DEFAULT STORIES */
let stories=[
{
title:"🔥 From Nothing to Success",
content:"He started with nothing but belief. Every day he worked until success came.",
img:"https://picsum.photos/400/200?1"
},
{
title:"💡 No Give Up (Pidgin)",
content:"No matter wetin happen, no give up. Life fit hard but you go make am.",
img:"https://picsum.photos/400/200?2"
},
{
title:"🚀 Hustle Story",
content:"One boy dey hustle everyday, small small e grow reach success.",
img:"https://picsum.photos/400/200?3"
},
{
title:"😂 Funny Life (Pidgin)",
content:"Life no be beans oh, but if you laugh, e go soft small.",
img:"https://picsum.photos/400/200?4"
}
];

/* LOAD STORIES */
function loadStories(){
let feed=document.getElementById("storyFeed");
feed.innerHTML="";

stories.forEach((s,i)=>{
feed.innerHTML+=`
<div class="card" onclick="openStory(${i})">
<h3>${s.title}</h3>
<img src="${s.img}">
</div>`;
});
}

/* OPEN STORY */
function openStory(i){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
document.getElementById("reader").style.display="block";

document.getElementById("title").innerText=stories[i].title;
document.getElementById("content").innerText=stories[i].content;
document.getElementById("img").src=stories[i].img;
}

/* BACK */
function goBack(){
document.getElementById("reader").style.display="none";
document.getElementById("stories").classList.add("show");
}

/* ADD STORY */
function addStory(){
let title=document.getElementById("titleInput").value;
let content=document.getElementById("storyInput").value;
let img=document.getElementById("imageInput").value || "https://picsum.photos/400/200";

if(!title || !content) return alert("Fill everything");

stories.unshift({title,content,img});
loadStories();

document.getElementById("titleInput").value="";
document.getElementById("storyInput").value="";
document.getElementById("imageInput").value="";

alert("Story posted!");
}

/* INIT */
loadStories();

</script>

</body>
</html>
