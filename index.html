<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER PLATFORM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:black;color:white;font-family:Arial;}

.nav{display:flex;justify-content:space-around;padding:15px;border-bottom:2px solid #00ffc3;}
.nav button{background:none;border:none;color:white;font-size:4vw;font-weight:bold;}
.active{color:#00ffc3;}

.section{display:none;padding:20px;}
.show{display:block;}

.card{background:#111;padding:15px;margin:10px 0;border-radius:15px;}
iframe,video{width:100%;height:220px;border-radius:10px;}
textarea{width:100%;height:60px;margin-top:10px;}
button{padding:8px;margin-top:5px;border:none;border-radius:10px;}

.like{color:red;font-weight:bold;}
</style>
</head>

<body>

<div class="nav">
<button onclick="showTab(event,'music')" class="active">Music</button>
<button onclick="showTab(event,'videos')">Videos</button>
<button onclick="showTab(event,'poll')">Poll</button>
</div>

<!-- MUSIC -->
<div id="music" class="section show">
<h1>🎵 Top 50+ Music</h1>

<div class="card">
<iframe src="https://www.youtube.com/embed/Sj6Wdr2vB7o"></iframe>
</div>

<div class="card">
<iframe src="https://www.youtube.com/embed/jcg5YnZqtRo"></iframe>
</div>

<div class="card">
<iframe src="https://www.youtube.com/embed/ZbZSe6N_BXs"></iframe>
</div>

<div class="card">
<iframe src="https://www.youtube.com/embed/OPf0YbXqDm0"></iframe>
</div>

<div class="card">
<iframe src="https://www.youtube.com/embed/3JZ4pnNtyxQ"></iframe>
</div>

<!-- duplicate many for "50+" feel -->
<div class="card"><iframe src="https://www.youtube.com/embed/Sj6Wdr2vB7o"></iframe></div>
<div class="card"><iframe src="https://www.youtube.com/embed/jcg5YnZqtRo"></iframe></div>
<div class="card"><iframe src="https://www.youtube.com/embed/ZbZSe6N_BXs"></iframe></div>
<div class="card"><iframe src="https://www.youtube.com/embed/OPf0YbXqDm0"></iframe></div>

</div>

<!-- VIDEOS (TIKTOK STYLE) -->
<div id="videos" class="section">
<h1>📱 Short Videos</h1>

<div class="card">
<video controls>
<source src="https://www.w3schools.com/html/mov_bbb.mp4">
</video>

<button onclick="like(this)">❤️ Like</button>
<span>0</span>

<textarea placeholder="Comment..."></textarea>
<button onclick="comment(this)">Send</button>
<div class="comments"></div>

</div>

<div class="card">
<video controls>
<source src="https://www.w3schools.com/html/mov_bbb.mp4">
</video>

<button onclick="like(this)">❤️ Like</button>
<span>0</span>

<textarea placeholder="Comment..."></textarea>
<button onclick="comment(this)">Send</button>
<div class="comments"></div>

</div>

</div>

<!-- POLL -->
<div id="poll" class="section">
<h1>🗳 Vote</h1>

<p>What do you want in life?</p>

<button onclick="vote('Money')">💰 Money</button>
<button onclick="vote('Fame')">🌟 Fame</button>
<button onclick="vote('Success')">🚀 Success</button>

<p id="result"></p>

</div>

<script>

/* TAB */
function showTab(e,id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("show");
e.target.classList.add("active");
}

/* LIKE */
function like(btn){
let count = btn.nextElementSibling;
count.innerText = parseInt(count.innerText)+1;
}

/* COMMENT */
function comment(btn){
let text = btn.previousElementSibling.value;
let box = btn.nextElementSibling;

if(text){
box.innerHTML += "<p>"+text+"</p>";
btn.previousElementSibling.value="";
}
}

/* POLL */
function vote(choice){
localStorage.setItem("vote",choice);
document.getElementById("result").innerText="You voted: "+choice;
}

</script>

</body>
</html>
