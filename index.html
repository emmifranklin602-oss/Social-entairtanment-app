<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER PLATFORM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:black;color:white;font-family:Arial;}

.nav{display:flex;justify-content:space-around;padding:15px;border-bottom:2px solid #00ffc3;}
.nav button{background:none;border:none;color:white;font-size:4vw;font-weight:bold;}
.active{color:#00ffc3;}

.section{display:none;padding:20px;}
.show{display:block;}

h1{font-size:clamp(28px,6vw,60px);margin-bottom:20px;}

.card{
background:#111;
padding:20px;
margin:15px 0;
border-radius:20px;
cursor:pointer;
}

.card img, iframe, video{
width:100%;
border-radius:10px;
margin-top:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
}

#reader{
display:none;
padding:20px;
line-height:1.7;
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showTab(event,'stories')" class="active">Stories</button>
<button onclick="showTab(event,'post')">Post</button>
</div>

<div id="stories" class="section show">
<h1>📖 Stories Feed</h1>

<div>
<button onclick="filterCategory('All')">All</button>
<button onclick="filterCategory('Hustle')">Hustle</button>
<button onclick="filterCategory('Money')">Money</button>
<button onclick="filterCategory('Motivation')">Motivation</button>
<button onclick="filterCategory('Love')">Love</button>
<button onclick="filterCategory('Pidgin')">Pidgin</button>
</div>

<div id="storyFeed"></div>
<div id="extraContent"></div>
</div>

<div id="post" class="section">
<h1>✍️ Post Story</h1>
<input id="titleInput" placeholder="Title"><br><br>
<textarea id="storyInput" placeholder="Write story..." style="width:100%;height:120px;"></textarea><br>
<input id="imageInput" placeholder="Image URL"><br>
<button onclick="addStory()">Post</button>
</div>

<div id="reader">
<button onclick="goBack()">⬅ Back</button>
<button onclick="continueReading()">▶ Continue</button>
<button onclick="speakStory()">🔊 Listen</button>

<h2 id="title"></h2>
<img id="img">
<p id="content"></p>
</div>

<script>

/* NAV */
function showTab(e,id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("show");
e.target.classList.add("active");
reader.style.display="none";
}

/* STORIES */
let categories=["Hustle","Money","Motivation","Love","Pidgin"];
let stories=[];

for(let i=1;i<=500;i++){
let cat=categories[i%categories.length];
stories.push({
title:`🔥 ${cat} Story ${i}`,
category:cat,
content:`${cat} story ${i}. Stay consistent. Never give up.`,
img:`https://picsum.photos/400/200?${i}`
});
}

/* QUEEN STORY */
stories.unshift({
title:"👑 Queen Adaeze",
category:"Legend",
content:`Adaeze was a proud princess who learned wisdom through hardship. Pride can destroy, humility builds.`,
img:"https://picsum.photos/400/200?queen"
});

/* LOAD STORIES */
function loadStories(filter="All"){
storyFeed.innerHTML="";
stories.slice(0,50).forEach((s,i)=>{
if(filter==="All"||s.category===filter){
storyFeed.innerHTML+=`
<div class="card" onclick="openStory(${i})">
<h3>${s.title}</h3>
<p>${s.category}</p>
<img src="${s.img}">
</div>`;
}
});
}

/* OPEN STORY */
function openStory(i){
localStorage.setItem("lastStory",i);
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
reader.style.display="block";
title.innerText=stories[i].title;
content.innerText=stories[i].content;
img.src=stories[i].img;
}

/* BACK */
function goBack(){
reader.style.display="none";
stories.classList?.add("show");
document.getElementById("stories").classList.add("show");
}

/* CONTINUE */
function continueReading(){
let i=localStorage.getItem("lastStory");
if(i!==null) openStory(i);
}

/* VOICE */
function speakStory(){
let speech=new SpeechSynthesisUtterance(content.innerText);
speechSynthesis.speak(speech);
}

/* ADD STORY */
function addStory(){
let t=titleInput.value;
let c=storyInput.value;
let i=imageInput.value||"https://picsum.photos/400/200";

if(!t||!c) return alert("Fill everything");

stories.unshift({title:t,content:c,img:i,category:"User"});
loadStories();
}

/* ================= */
/* EXTRA CONTENT */
/* ================= */

let extra="";

/* POSTS */
for(let i=1;i<=50;i++){
extra+=`<div class="card">🔥 Post ${i}: Stay consistent and grow.</div>`;
}

/* TIPS */
for(let i=1;i<=50;i++){
extra+=`<div class="card">💡 Tip ${i}: Learn daily and improve.</div>`;
}

/* VIDEOS */
let vids=[
"Sj6Wdr2vB7o","jcg5YnZqtRo","3JZ4pnNtyxQ","OPf0YbXqDm0","ZbZSe6N_BXs"
];
extra+=`<h1>🎥 Videos</h1>`;
vids.sort(()=>0.5-Math.random()).forEach(v=>{
extra+=`<div class="card"><iframe src="https://www.youtube.com/embed/${v}" allowfullscreen></iframe></div>`;
});

/* MUSIC */
let artists={
"Wizkid":["0zB6rWvL2P8","4NRXx6U8ABQ"],
"Rema":["t9xwN1R5zT0","kPa7bsKwL-c"],
"Davido":["hVEp-P2-rqY","2zToEPpFEN8"],
"Burna Boy":["421w1j87fEM","9bZkp7q19f0"],
"Tekno":["4b5s2p9Xn7c","3AtDnEC4zak"]
};

extra+=`<h1>🎵 Naija Music</h1>`;

for(let a in artists){
extra+=`<h2>${a}</h2>`;
artists[a].forEach(id=>{
extra+=`<div class="card"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe></div>`;
});
}

/* POLLS */
extra+=`<h1>🗳 Polls</h1>`;
for(let i=1;i<=20;i++){
extra+=`
<div class="card">
Poll ${i}: What do you want?
<button onclick="alert('Success')">Success</button>
<button onclick="alert('Money')">Money</button>
</div>`;
}

document.getElementById("extraContent").innerHTML=extra;

/* INIT */
loadStories();

</script>

</body>
</html>
