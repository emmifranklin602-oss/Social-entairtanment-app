<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER PLATFORM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:black;color:white;font-family:Arial;}

.nav{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
border-bottom:2px solid #00ffc3;
}

.nav button{
background:#111;
color:white;
border:none;
padding:10px;
border-radius:10px;
min-width:90px;
}

.active{background:#00ffc3;color:black;}

.section{display:none;padding:20px;}
.show{display:block;}

.card{
background:#111;
padding:20px;
margin:15px 0;
border-radius:15px;
}

iframe,img{
width:100%;
border-radius:10px;
}

textarea{width:100%;height:100px;}

button{padding:10px;margin:5px;border:none;border-radius:10px;}

#reader{display:none;padding:20px;line-height:1.8;}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<button onclick="showTab(event,'stories')" class="active">Stories</button>
<button onclick="showTab(event,'post')">Post</button>
<button onclick="showTab(event,'news')">News</button>
<button onclick="showTab(event,'community')">Community</button>
</div>

<!-- STORIES -->
<div id="stories" class="section show">
<h2>📖 Stories</h2>
<div id="storyFeed"></div>
</div>

<!-- POST -->
<div id="post" class="section">
<h2>✍️ Post</h2>
<textarea id="postInput"></textarea>
<button onclick="addPost()">Post</button>
<div id="postFeed"></div>
</div>

<!-- NEWS -->
<div id="news" class="section">
<h2>📰 Latest News</h2>
<div id="newsFeed"></div>
</div>

<!-- COMMUNITY -->
<div id="community" class="section">
<h2>🌍 Community</h2>
<div id="communityFeed"></div>
</div>

<!-- READER -->
<div id="reader">
<button onclick="goBack()">⬅ Back</button>
<h2 id="title"></h2>
<p id="content"></p>
</div>

<script>

/* NAV */
function showTab(e,id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("show");
e.target.classList.add("active");
reader.style.display="none";
}

/* STORIES */
let stories=[];
for(let i=1;i<=100;i++){
stories.push({
title:"Story "+i,
content:"This is a long story about life, success, struggle, and growth. Keep going no matter what happens."
});
}

function loadStories(){
storyFeed.innerHTML="";
stories.forEach((s,i)=>{
storyFeed.innerHTML+=`
<div class="card" onclick="openStory(${i})">
<h3>${s.title}</h3>
<p>Tap to read full story</p>
</div>`;
});
}

/* POSTS */
let posts=[];
function addPost(){
let val=postInput.value;
posts.unshift(val);
renderPosts();
}

function renderPosts(){
postFeed.innerHTML="";
posts.forEach(p=>{
postFeed.innerHTML+=`<div class="card">${p}</div>`;
});
}

/* NEWS */
let news=[
"🚨 Nigeria strengthening global partnerships and trade opportunities.",
"⚠️ Security challenges continue in northern Nigeria.",
"💰 New financial rules introduced to control economy.",
"🔥 Entertainment industry growing rapidly in Nigeria.",
"📱 Tech and AI rising fast in Africa."
];

function loadNews(){
newsFeed.innerHTML="";
news.forEach((n,i)=>{
newsFeed.innerHTML+=`
<div class="card" onclick="openNews(${i})">
<h3>${n}</h3>
<p>Tap to read more</p>
</div>`;
});
}

function openNews(i){
reader.style.display="block";
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
title.innerText="📰 Full News";
content.innerText=news[i]+" This is extended detailed news explanation to make reading longer and more interesting like real news apps.";
}

/* COMMUNITY */
let community=[];
for(let i=1;i<=50;i++){
community.push("🔥 Community post "+i+" - Share your thoughts and ideas.");
}

function loadCommunity(){
communityFeed.innerHTML="";
community.forEach(c=>{
communityFeed.innerHTML+=`<div class="card">${c}</div>`;
});
}

/* OPEN STORY */
function openStory(i){
reader.style.display="block";
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
title.innerText=stories[i].title;
content.innerText=stories[i].content;
}

/* BACK */
function goBack(){
reader.style.display="none";
document.getElementById("stories").classList.add("show");
}

/* INIT */
loadStories();
loadNews();
loadCommunity();

</script>

</body>
</html>
