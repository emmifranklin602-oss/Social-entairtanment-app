<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER PLATFORM</title>

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    color: white;
    font-family: Arial;
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-around;
    padding: 15px;
    background: black;
    border-bottom: 2px solid #00ffc3;
}

.nav button {
    background: none;
    border: none;
    color: white;
    font-size: 4vw;
    font-weight: bold;
    cursor: pointer;
}

/* ACTIVE TAB */
.active {
    color: #00ffc3;
}

/* SEARCH */
.search {
    width: 90%;
    margin: 20px auto;
    display: block;
    padding: 15px;
    border-radius: 15px;
    font-size: 18px;
    border: none;
}

/* SECTION */
.section {
    display: none;
    padding: 20px;
}

.show {
    display: block;
}

/* TITLE */
h1 {
    font-size: clamp(28px, 6vw, 60px);
    margin-bottom: 20px;
}

/* CARD */
.card {
    width: 100%;
    padding: 20px;
    margin: 15px 0;
    border-radius: 20px;
    background: linear-gradient(90deg, #111, #333);
    font-size: clamp(16px, 4vw, 22px);
    font-weight: bold;
    transition: 0.3s;
}

/* HOVER */
.card:hover {
    transform: scale(1.05);
    background: #444;
}

/* BUTTON */
.link-btn {
    display: block;
    margin-top: 10px;
    padding: 10px;
    background: #00ffc3;
    color: black;
    text-align: center;
    border-radius: 10px;
    text-decoration: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    background: #111;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <button onclick="showTab(event,'apps')" class="active">Apps</button>
    <button onclick="showTab(event,'entertainment')">Entertainment</button>
    <button onclick="showTab(event,'tips')">Tips</button>
    <button onclick="showTab(event,'knowledge')">Knowledge</button>
</div>

<!-- SEARCH -->
<input class="search" placeholder="Search anything...">

<!-- APPS -->
<div id="apps" class="section show">
<h1>🔥 Apps</h1>

<div class="card">📱 WhatsApp
<a href="https://wa.me" class="link-btn">Open</a></div>

<div class="card">📸 Instagram
<a href="https://instagram.com" class="link-btn">Open</a></div>

<div class="card">🎵 Spotify
<a href="https://spotify.com" class="link-btn">Open</a></div>

<div class="card">🎨 Canva
<a href="https://canva.com" class="link-btn">Open</a></div>

</div>

<!-- ENTERTAINMENT -->
<div id="entertainment" class="section">
<h1>🎬 Entertainment</h1>

<div class="card">🎥 Watch Videos</div>
<div class="card">🎮 Play Games</div>
<div class="card">🎵 Music</div>
<div class="card">😂 Funny Content</div>

</div>

<!-- TIPS -->
<div id="tips" class="section">
<h1>💡 Tips</h1>

<div class="card">🔥 Make money online</div>
<div class="card">📈 Grow fast</div>
<div class="card">⚡ Be productive</div>

</div>

<!-- KNOWLEDGE -->
<div id="knowledge" class="section">
<h1>📚 Knowledge</h1>

<div class="card">🤖 Learn AI</div>
<div class="card">💻 Learn Coding</div>
<div class="card">📊 Business Ideas</div>

</div>

<!-- FOOTER -->
<footer>
<h2>🔥 SUPER PLATFORM</h2>
<p>All-in-one powerful website</p>
</footer>

<!-- SCRIPT -->
<script>

function showTab(event, tabId) {

    let sections = document.querySelectorAll(".section");
    let buttons = document.querySelectorAll(".nav button");

    // hide all
    sections.forEach(sec => sec.classList.remove("show"));
    buttons.forEach(btn => btn.classList.remove("active"));

    // show selected
    document.getElementById(tabId).classList.add("show");
    event.target.classList.add("active");
}

</script>

</body>
</html>
